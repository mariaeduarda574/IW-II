<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade marcinhoo</title>
</head>
<body>
    <h1>Minha página</h1>
    <p id="texto">Texto original</p>
    <button onclick="mudarTexto()">Clique aqui</button>

    <script>
        function mudarTexto(){
            document.getElementById("texto").innerText = "Texto alterado!!";
        }
        
    </script>

    <style>
        body{
            background-color: blue;
        }
    </style>
</body>
</html>
